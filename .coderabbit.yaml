# yaml-language-server: $schema=https://coderabbit.ai/integrations/schema.v2.json
#
# CodeRabbit configuration for unkos-dev/reverie.
#
# Trial framing: see adr/2026-05-07-coderabbit-parallel-trial.md.
# Tally tracker: UNK-187 (sister to UNK-155 for Greptile).
#
# Profile picked `assertive` (not the published default `chill`) so the
# trial baseline matches the verbose-by-design Greptile equivalent
# documented in adr/2026-05-04-greptile-trial.md § "Trial configuration".
# Easier to dial down at the gate with evidence than to start filtered
# and miss patterns CodeRabbit only flags at the louder tier.

language: en-US
tone_instructions: ""
early_access: false

reviews:
  profile: assertive
  request_changes_workflow: false
  high_level_summary: true
  poem: true
  review_status: true
  collapse_walkthrough: false
  suggested_reviewers: false
  suggested_labels: false
  auto_review:
    enabled: true
    drafts: false
  path_filters:
    - "!**/package-lock.json"
    - "!**/Cargo.lock"
  path_instructions:
    - path: "backend/**/*.rs"
      instructions: |
        Backend uses the `time` crate, not `chrono`. Flag any new `chrono`
        import. Errors flow through `thiserror`-derived `AppError`; never
        return raw `anyhow::Error` from public APIs. SQL queries use sqlx
        compile-time macros (`query!` / `query_as!` / `query_scalar!`); a
        new runtime-form `sqlx::query(...)` outside the documented
        carve-outs in `.github/sqlx-runtime-allowlist.txt` is a regression
        — flag it.
    - path: "frontend/src/**/*.{ts,tsx}"
      instructions: |
        No raw hex colour literals — every brand colour comes from the
        canonical token system (--color-canvas, --color-fg, --color-accent,
        etc.). `Lockup.tsx` is the documented exemption (philosophy §11C
        invariant). No TypeScript `enum` — use `as const` objects + union
        types. No `as` type assertions. No `!` non-null assertions.
        `useEffect` always returns a cleanup function; async work uses
        `AbortController`, never `async () => …` directly.
    - path: "frontend/src/**/*.tsx"
      instructions: |
        No inline JSX `style={{...}}` object literals — use Tailwind
        classes or design tokens. `Lockup.tsx` and `src/components/ui/**`
        (shadcn-generated) are the documented exemptions.
    - path: "frontend/src/components/ui/**"
      instructions: |
        shadcn/ui primitives are CLI-generated (`npx shadcn@latest add`).
        Do not flag style or convention divergences in this directory
        unless they affect runtime correctness.
    - path: "**/*"
      instructions: |
        Reverie is open-source and self-hosted. Threat model is a multi-
        user exposed instance, not a private homelab. Treat security
        findings on user input, auth, sessions, secrets, file I/O, XML
        parsing, outbound HTTP, and response headers as load-bearing —
        not nice-to-have. Never surface decrypted secret values; describe
        presence and shape only (source, length, format) — never the
        value itself. TDD is mandatory. A code change without a
        corresponding test (happy path, negative, edge case where
        non-obvious) should be flagged as incomplete. Conventional
        Commits are mandatory. Branch names follow GitHub Flow with
        prefixes feat/, fix/, refactor/, docs/, chore/, test/, perf/.
  abort_on_close: true
  finishing_touches:
    docstrings:
      enabled: true
    unit_tests:
      enabled: true
    simplify:
      enabled: true
  tools:
    # CI duplicates — explicitly disabled. CI is the authoritative lint
    # surface (cargo clippy --deny warnings, eslint strictTypeChecked,
    # prettier, stylelint, markdownlint-cli2 with the repo's config).
    # CodeRabbit's bundled wrappers either duplicate the same diagnostics
    # or run against a different (default / weaker) ruleset, both of
    # which produce noise without signal.
    markdownlint:
      enabled: false
    biome:
      enabled: false
    eslint:
      enabled: false
    ruff:
      enabled: false
    clippy:
      enabled: false
    stylelint:
      enabled: false
    # Net-new signal vs CI — explicitly enabled. (Default is also true;
    # explicit declaration insulates the config from CodeRabbit default
    # changes.)
    shellcheck:
      enabled: true
    yamllint:
      enabled: true
    actionlint:
      enabled: true
    hadolint:
      enabled: true
    # Secret scanning. Reverie has no secrets in tree, but Renovate and
    # contributor PRs touch generated configs where leakage is plausible.
    gitleaks:
      enabled: true
    trufflehog:
      enabled: true
    presidio:
      enabled: true
    # Security and SAST patterns. Reverie's threat model is multi-user
    # exposed instance — security pattern matching across the diff is
    # exactly the differentiator we want to preserve.
    semgrep:
      enabled: true
    opengrep:
      enabled: true
    # Dep + IaC vulnerability scanning. Reverie has Dockerfile, GitHub
    # Actions, and a Cargo / npm dep tree — three IaC/SCA surfaces CI
    # does not yet exhaustively scan.
    trivy:
      enabled: true
    checkov:
      enabled: true
    osvScanner:
      enabled: true
    # Markdown grammar and style — kept on for the trial. Markdown
    # documentation surface (README, CONTRIBUTING, ADRs, docs/, debt/)
    # is load-bearing for the open-source-self-hosting audience. Disable
    # at the gate if the noise:signal ratio is bad.
    languagetool:
      enabled: true
chat:
  auto_reply: true
knowledge_base:
  opt_out: false
  learnings:
    scope: auto
  issues:
    scope: auto
  jira:
    project_keys: []
  linear:
    team_keys: []
