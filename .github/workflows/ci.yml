name: CI

on:
  pull_request:
    branches: [main]
  merge_group:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # Detect which areas of the repo changed so downstream jobs can skip
  # entirely when their inputs are untouched. Documentation-only PRs
  # (CLAUDE.md, README, /plans/, etc.) skip the heavy jobs.
  changes:
    name: Detect changes
    runs-on: ubuntu-latest
    outputs:
      backend: ${{ steps.filter.outputs.backend }}
      audit: ${{ steps.filter.outputs.audit }}
      frontend: ${{ steps.filter.outputs.frontend }}
      staging: ${{ steps.filter.outputs.staging }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          # On merge_group events, paths-filter's default base (HEAD~1)
          # only sees the topmost commit in the synthetic merge ref —
          # it would miss the diff for any PR sharing the queue. Pin
          # explicitly to merge_group.base_sha so downstream skip
          # decisions match the actual PR-against-main diff.
          base: ${{ github.event.merge_group.base_sha || github.base_ref }}
          ref: ${{ github.event.merge_group.head_sha || github.ref }}
          filters: |
            backend:
              - 'backend/**'
              - 'docker/init-roles.sql'
              - 'docker-compose.yml'
              - 'Dockerfile'
              - '.github/workflows/ci.yml'
            audit:
              - 'backend/Cargo.toml'
              - 'backend/Cargo.lock'
              - '.github/workflows/ci.yml'
            frontend:
              - 'frontend/**'
              - 'Dockerfile'
              - '.github/workflows/ci.yml'
            staging:
              - 'docker/compose.staging.yml'
              - 'docker/init-roles.sql'
              - 'docker/staging.env.bootstrap.example'
              - 'docker/staging.env.runtime.example'
              - '.github/workflows/ci.yml'

  backend:
    name: Backend
    needs: changes
    if: needs.changes.outputs.backend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    services:
      postgres:
        image: postgres:18
        env:
          POSTGRES_USER: reverie
          POSTGRES_PASSWORD: reverie
          POSTGRES_DB: reverie_dev
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U reverie -d reverie_dev"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 5
    env:
      # `sqlx::test` connects as the schema owner to create per-test databases
      # and run migrations against them; role pools for reverie_app /
      # reverie_ingestion are built per-test in code.
      DATABASE_URL: postgres://reverie:reverie@localhost:5432/reverie_dev
    steps:
      - uses: actions/checkout@v6

      - name: Create database roles
        run: psql postgres://reverie:reverie@localhost:5432/reverie_dev -f docker/init-roles.sql
        working-directory: ${{ github.workspace }}

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: backend

      - uses: taiki-e/install-action@v2
        with:
          tool: sqlx-cli@0.8.6

      - name: Apply migrations
        run: sqlx migrate run

      - name: Check formatting
        run: cargo fmt --check

      - name: Lint
        run: cargo clippy -- -D warnings

      # Phase 1 of the tiered comment policy rollout
      # (adr/2026-05-08-tiered-comment-policy.md). No missing-docs
      # requirement yet — just kills broken intra-doc cross-refs in the
      # docstrings that already exist. `cargo doc` over the workspace
      # without `--document-private-items` is the conservative scope:
      # pub items only, matching Tier 1 surface.
      - name: Doc lint (broken intra-doc links)
        env:
          RUSTDOCFLAGS: "-D rustdoc::broken_intra_doc_links"
        run: cargo doc --no-deps --workspace

      # UNK-167: drift guard on the committed .sqlx/ query cache. Every
      # `cargo sqlx prepare` regeneration must be checked in; CI fails if
      # cache is stale relative to query macros + live schema.
      - name: Check sqlx query cache freshness
        run: cargo sqlx prepare --check -- --tests

      # UNK-172: grep-guard against new runtime `sqlx::query[*](...)`
      # invocations creeping back in. Allowlist documents legitimate
      # carve-outs (DDL, dynamic SQL, set_config GUC, enum-drift probes).
      - name: Guard against new runtime sqlx::query invocations
        working-directory: ${{ github.workspace }}
        run: |
          set -euo pipefail
          violations=$(grep -rnE 'sqlx::query[a-z_]*\(' backend/src/ \
              | grep -v -F -f <(grep -vE '^\s*(#|$)' .github/sqlx-runtime-allowlist.txt) \
              || true)
          if [ -n "$violations" ]; then
              echo "Disallowed runtime sqlx::query invocations detected." >&2
              echo "Use compile-time macros (query!, query_as!, query_scalar!)" >&2
              echo "or add a justified entry to .github/sqlx-runtime-allowlist.txt." >&2
              echo "" >&2
              echo "$violations" >&2
              exit 1
          fi

      - name: Test
        run: cargo test

  audit:
    name: Security Audit
    needs: changes
    if: needs.changes.outputs.audit == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v6
      - run: cargo install cargo-audit --locked
      - name: Audit dependencies
        # Suppressed advisories — each must have a justification:
        #
        # RUSTSEC-2023-0071 — rsa: Marvin Attack (PKCS#1 v1.5 timing sidechannel).
        #   No patched version exists upstream. Reverie uses rsa transitively via
        #   openidconnect for JWT *verification* only — the vulnerable PKCS#1 v1.5
        #   *decryption* path is never invoked.
        #
        # RUSTSEC-2026-0097 — rand: soundness issue (aliased &mut via log+thread_rng).
        #   rand 0.8.x is pulled in transitively by sqlx 0.8; the ecosystem has not
        #   yet released sqlx 0.9 / rand-0.9-compatible versions. Revisit when
        #   sqlx 0.9 goes stable.
        run: cargo audit --ignore RUSTSEC-2023-0071 --ignore RUSTSEC-2026-0097

  frontend:
    name: Frontend
    needs: changes
    if: needs.changes.outputs.frontend == 'true'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 24.15.0
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm test

      - name: Stylelint
        run: npx stylelint 'src/**/*.css' --max-warnings 0

      - name: Verify font integrity
        working-directory: frontend/public/fonts/fontshare/files
        run: sha256sum -c SHA256SUMS

      - name: Build
        run: npm run build

  # UNK-185: smoke test the staging compose init path. Catches role-clause
  # regressions in init-roles.sql and required-env-var regressions in the
  # compose `${VAR:?required}` interpolations before they land on staging.
  # Postgres-only `up` — the `reverie` service isn't booted (no image
  # available in this lane; the init surface under test is postgres).
  staging-smoke:
    name: Staging compose smoke
    needs: changes
    if: needs.changes.outputs.staging == 'true'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # Build .env from the committed example to also catch regressions where
      # a required key is renamed in compose.staging.yml but not in the
      # example (debt entry's failure mode #2). Distinct passwords per role
      # so a swapped CREATE ROLE clause in init-roles.sql can't authenticate
      # cross-role and pass silently.
      - name: Prepare env files from examples
        working-directory: docker
        run: |
          set -euo pipefail
          cp staging.env.bootstrap.example .env
          # `.env.runtime` is required: true on the reverie service; compose
          # still validates env_file presence at parse time even when the
          # service isn't being started. Populate with stub values — never
          # read since reverie isn't started.
          cp staging.env.runtime.example .env.runtime
          sed -i \
            -e 's|^POSTGRES_PASSWORD=$|POSTGRES_PASSWORD=smoke_super_pw_1|' \
            -e 's|^REVERIE_APP_PASSWORD=$|REVERIE_APP_PASSWORD=smoke_app_pw_2|' \
            -e 's|^REVERIE_INGESTION_PASSWORD=$|REVERIE_INGESTION_PASSWORD=smoke_ing_pw_3|' \
            -e 's|^REVERIE_READONLY_PASSWORD=$|REVERIE_READONLY_PASSWORD=smoke_ro_pw_4|' \
            -e 's|^REVERIE_VERSION=$|REVERIE_VERSION=smoke-test|' \
            .env

      - name: Bring up postgres service
        run: docker compose -f docker/compose.staging.yml up -d --wait --wait-timeout 120 reverie-postgres

      # Assert init-roles.sql actually provisioned the three runtime roles
      # with LOGIN and CONNECT grant on POSTGRES_DB. `docker compose exec`
      # keeps the psql client version matched to the server image (postgres:18).
      - name: Assert roles exist with CONNECT grant
        run: |
          set -euo pipefail
          exec_psql() {
            docker compose -f docker/compose.staging.yml exec -T \
              -e PGPASSWORD=smoke_super_pw_1 \
              reverie-postgres psql -v ON_ERROR_STOP=1 -At \
              -U reverie -d reverie "$@"
          }
          for role in reverie_app reverie_ingestion reverie_readonly; do
            exists=$(exec_psql -c "SELECT 1 FROM pg_roles WHERE rolname = '${role}' AND rolcanlogin")
            if [ "$exists" != "1" ]; then
              echo "Role ${role} missing or cannot login" >&2
              exit 1
            fi
            has_connect=$(exec_psql -c "SELECT has_database_privilege('${role}', current_database(), 'CONNECT')")
            if [ "$has_connect" != "t" ]; then
              echo "Role ${role} lacks CONNECT on $(exec_psql -c 'SELECT current_database()')" >&2
              exit 1
            fi
          done

      # Authenticate as each runtime role with the password we supplied via
      # env. Catches `LOGIN PASSWORD` clause regressions in init-roles.sql
      # (the 28P01-at-runtime failure mode the debt entry calls out).
      - name: Assert each role authenticates with its supplied password
        run: |
          set -euo pipefail
          login_as() {
            local role=$1 pw=$2
            docker compose -f docker/compose.staging.yml exec -T \
              -e PGPASSWORD="${pw}" \
              reverie-postgres psql -v ON_ERROR_STOP=1 -At \
              -h localhost -U "${role}" -d reverie -c 'SELECT 1' >/dev/null
          }
          login_as reverie_app       smoke_app_pw_2
          login_as reverie_ingestion smoke_ing_pw_3
          login_as reverie_readonly  smoke_ro_pw_4

      - name: Tear down postgres service
        if: always()
        run: docker compose -f docker/compose.staging.yml down -v

      # Negative path: blank a required env var, run `compose config`, assert
      # the `${VAR:?required}` interpolation surfaces a hard fail. `config`
      # is sufficient because variable substitution happens at parse time;
      # no daemon spin-up needed. Key-name presence in stderr is the
      # load-bearing signal — exact wording of compose's error message is
      # not pinned across versions.
      - name: Assert missing required env var hard-fails
        working-directory: docker
        run: |
          set -euo pipefail
          sed -i 's|^REVERIE_APP_PASSWORD=.*|REVERIE_APP_PASSWORD=|' .env
          if stderr=$(docker compose -f compose.staging.yml config 2>&1 >/dev/null); then
            echo "Expected compose config to fail with missing REVERIE_APP_PASSWORD, but it succeeded" >&2
            echo "stderr was:" >&2
            echo "${stderr}" >&2
            exit 1
          fi
          if ! grep -qF REVERIE_APP_PASSWORD <<<"${stderr}"; then
            echo "compose config failed but stderr did not mention REVERIE_APP_PASSWORD" >&2
            echo "stderr was:" >&2
            echo "${stderr}" >&2
            exit 1
          fi
