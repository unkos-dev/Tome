name: Docker Publish

# Two publication channels per ADR
# adr/2026-05-12-platform-matrix-via-native-runners.md
# (supersedes adr/2026-05-12-decouple-staging-image-from-semver-releases.md):
#   - `main`-branch push -> `:main` (floating) + `:sha-<7>` (immutable pin)
#   - `v*` tag push      -> `:vX.Y.Z` + `:X.Y` (semver, via release-please)
# `:latest` is intentionally not auto-assigned; reserved for the first
# semver release.
#
# Platform matrix split by trigger — see ADR:
#   - `main`-branch push -> linux/arm64 only. Sole consumer is
#     oci-compute-1 (Ampere A1, arm64). Single-arch keeps main-push CI
#     fast.
#   - `v*` tag push      -> linux/amd64,linux/arm64 manifest list.
#     Public-release boundary; self-hosters run mixed architectures.
#
# Build shape: a small `prepare-matrix` job emits the include list for
# the current trigger, then `build` instantiates one job per arch on a
# native GitHub-hosted runner (amd64 on ubuntu-latest, arm64 on
# ubuntu-24.04-arm), pushed by digest. A final `merge` job assembles
# the manifest list with `docker buildx imagetools create`. No QEMU;
# release boundary fully native on both legs.
on:
  push:
    tags:
      - "v*"
    branches:
      - main
  # Manual trigger for ad-hoc rebuilds and feature-branch verification of
  # workflow changes that wouldn't otherwise fire on a non-main push.
  workflow_dispatch:

permissions:
  contents: read
  packages: write

# Serialize per-ref runs but do not cancel in-flight builds. The
# `deploy-staging` job runs in this same workflow on `main` push; a
# workflow-level `cancel-in-progress: true` would propagate to all jobs
# in the cancelled run, including a near-complete deploy. Job-level
# concurrency cannot shield a job from workflow-level cancellation.
# Build is idempotent — sequential runs with no cancellation is the
# correct trade for main deploys (UNK-231 plan rev 3, D2 fix).
concurrency:
  group: docker-publish-${{ github.ref }}

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: unkos-dev/reverie

jobs:
  # Emit the matrix include list dynamically per trigger. Job-level
  # `if:` cannot reference the `matrix` context, so the per-trigger
  # filter lives here in the matrix shape rather than as a job gate.
  prepare-matrix:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set.outputs.matrix }}
    steps:
      - id: set
        env:
          REF_TYPE: ${{ github.ref_type }}
        run: |
          if [[ "$REF_TYPE" == "tag" ]]; then
            echo 'matrix={"include":[{"arch":"amd64","platform":"linux/amd64","runner":"ubuntu-latest"},{"arch":"arm64","platform":"linux/arm64","runner":"ubuntu-24.04-arm"}]}' >> "$GITHUB_OUTPUT"
          else
            echo 'matrix={"include":[{"arch":"arm64","platform":"linux/arm64","runner":"ubuntu-24.04-arm"}]}' >> "$GITHUB_OUTPUT"
          fi

  build:
    needs: prepare-matrix
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.prepare-matrix.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      # metadata-action emits OCI labels (org.opencontainers.image.*)
      # consumed by the per-arch build below. Tag emission also runs
      # here but is unused per-arch — tags are assigned in the `merge`
      # job against the final manifest list. `imagetools create` can't
      # back-fill labels into already-pushed image configs, so labels
      # must be set at per-arch build time.
      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}

      # Per-arch builds push by digest only; tag assignment happens in
      # the `merge` job against the final manifest list.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          labels: ${{ steps.meta.outputs.labels }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max
          sbom: true
          cache-from: type=gha,scope=buildcache-${{ matrix.arch }}
          cache-to: type=gha,scope=buildcache-${{ matrix.arch }},mode=max

      # Tier 1 observability — surfaces per-run buildkit content-store state
      # without external infra. `if: always()` so failures don't suppress
      # diagnostic output. Note: `buildx du` reports the *ephemeral* buildkit
      # daemon's local content store on this runner, not the persistent gha
      # cache pool — useful for spotting whether the build hydrated the local
      # store correctly, but not a substitute for `gh api ...actions/caches`
      # to inspect the persistent pool. Adopt Tier 2 (weekly cache-inventory
      # cron against the persistent pool) only on revisit conditions per ADR.
      - name: Local buildkit content store
        if: always()
        run: docker buildx du

      - name: Step summary
        if: always()
        env:
          ARCH: ${{ matrix.arch }}
        run: |
          {
            echo "## Build cache report (arch=${ARCH})"
            echo
            echo "\`docker buildx du\` above shows this runner's local buildkit"
            echo "content store (ephemeral). Persistent gha cache state lives in"
            echo "the repo-level Actions cache pool. To confirm cooker layer"
            echo "reuse, inspect 'Build and push by digest' step log for"
            echo "per-stage \`CACHED\` lines."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v7
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v8
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v4

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-,enable=${{ github.ref_type != 'tag' }}

      # imagetools create assembles a manifest list from the per-arch
      # digests and tags it. Provenance/SBOM attestations on the per-arch
      # images are preserved on the resulting manifest list. OCI labels
      # are set on the per-arch images at build time (above) — they
      # cannot be added retroactively here.
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          tag_args=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          digest_args=$(printf "${IMAGE_REF}@sha256:%s " *)
          # shellcheck disable=SC2086  # word-splitting intended on both
          docker buildx imagetools create $tag_args $digest_args

      - name: Inspect image
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          docker buildx imagetools inspect "${IMAGE_REF}:${{ steps.meta.outputs.version }}"

  # Deploy staging: pull the freshly-published :main image inside the
  # reverie-dev LXC on oci-compute-1 and reconcile compose. Runs on a
  # self-hosted runner scoped to this repo (oci-arm64-reverie-deployer).
  #
  # Gate: main-branch push events only (NOT tags, NOT pull_request,
  # NOT workflow_dispatch). The actor allowlist below admits:
  #   - junkovich    : manual merges (feature PRs, ad-hoc deploys via
  #                    empty-commit push).
  #   - renovate[bot]: Renovate auto-merges. Per .github/renovate.json
  #                    these are gated to patch updates only — patch
  #                    on github-actions/dockerfile/docker-compose at
  #                    any version, and patch on cargo/npm at v1.0+
  #                    (zerover 0.x.y deps stay manual). reverie-dev
  #                    is a dev/staging target, not production, so
  #                    auto-deploy after the existing PR-level CI
  #                    gates (audit + tests + smoke + CodeQL +
  #                    Renovate's `minimumReleaseAge: 3 days`) is the
  #                    right trade. See homelab UNK-231 plan rev 3 D3
  #                    for the original strict-gate rationale (prod
  #                    threat model) — relaxed here because the LXC
  #                    is not prod.
  #
  # No job-level concurrency block: dropping the workflow-level
  # `cancel-in-progress: true` upstream makes a job-level override
  # unnecessary. Build is idempotent; sequential runs are the correct
  # shape for main deploys.
  deploy-staging:
    needs: merge
    runs-on: [self-hosted, linux, arm64, reverie-dev-deployer]
    if: >-
      github.event_name == 'push' &&
      github.ref == 'refs/heads/main' &&
      (github.actor == 'junkovich' || github.actor == 'renovate[bot]')
    timeout-minutes: 10
    steps:
      # Configure the Incus TLS remote per-job. The runner image
      # (myoung34/github-runner) lacks an /etc/runner.d hook convention
      # that the plan originally assumed, so we install the bind-mounted
      # cert/key into the runner's incus client dir on every run. The
      # cert and key are mounted read-only at /run/secrets/incus-{cert,key}
      # by the runner compose unit on oci-compute-1; the remote endpoint
      # 10.123.0.1:8443 is the Incus daemon on the host with a
      # --restricted --projects reverie-dev trust scope. Idempotent: skip
      # `remote add` if it already exists.
      - name: Configure Incus TLS remote
        run: |
          set -euo pipefail
          install -d -m 0700 "${HOME}/.config/incus"
          install -m 0600 /run/secrets/incus-cert "${HOME}/.config/incus/client.crt"
          install -m 0600 /run/secrets/incus-key  "${HOME}/.config/incus/client.key"
          if ! incus remote list --format csv | cut -d, -f1 | grep -qx 'reverie-dev'; then
            incus remote add reverie-dev https://10.123.0.1:8443 \
              --accept-certificate --auth-type=tls
          fi
          # Probe: fail loud if the remote is not reachable. A silent
          # failure here would let subsequent `incus exec` calls fall
          # back to the local daemon (which does not exist on this
          # runner) and produce a confusing error downstream.
          incus exec reverie-dev:reverie-dev -- true

      - name: Snapshot pre-deploy REVERIE_VERSION (rollback breadcrumb)
        id: pre
        run: |
          set -euo pipefail
          # Capture the REVERIE_VERSION line from the LXC's .env.version.
          # That file is what `docker compose --env-file .env.version` reads
          # to resolve the floating tag (`:main`, `sha-<7>`, etc.). Storing
          # its current contents — not the local docker image ID — gives
          # the operator a value they can drop straight back into the same
          # file to recover the previous deploy. Fallback to "unknown" if
          # the file is missing or malformed.
          content=$(incus exec reverie-dev:reverie-dev -- \
            cat /opt/reverie-dev/.env.version 2>/dev/null || true)
          version=$(printf '%s\n' "$content" \
            | grep -E '^REVERIE_VERSION=' \
            | head -1 \
            | cut -d= -f2- || true)
          version="${version:-unknown}"
          echo "Pre-deploy REVERIE_VERSION: $version"
          echo "version=$version" >> "$GITHUB_OUTPUT"

      - name: Pull and reconcile reverie compose inside LXC
        run: |
          incus exec reverie-dev:reverie-dev -- bash -lc '
            set -euo pipefail
            cd /opt/reverie-dev
            docker compose -f compose.yml -f compose.hawser.yml \
              --env-file .env --env-file .env.version pull reverie
            docker compose -f compose.yml -f compose.hawser.yml \
              --env-file .env --env-file .env.version up -d
          '

      - name: Wait for reverie healthy
        id: health
        run: |
          for i in $(seq 1 30); do
            status=$(incus exec reverie-dev:reverie-dev -- \
              docker inspect --format='{{.State.Health.Status}}' reverie 2>/dev/null || echo "missing")
            if [[ "$status" == "healthy" ]]; then
              echo "reverie healthy after ${i}0s"
              exit 0
            fi
            echo "[$i/30] reverie status=$status — waiting"
            sleep 10
          done
          echo "::error::reverie did not reach healthy within 300s"
          incus exec reverie-dev:reverie-dev -- docker logs --tail 100 reverie || true
          exit 1

      - name: Emit rollback breadcrumb on failure
        if: failure() && steps.pre.outputs.version != '' && steps.pre.outputs.version != 'unknown'
        env:
          PRE_VERSION: ${{ steps.pre.outputs.version }}
        run: |
          # The error stream below contains a literal copy-paste rollback
          # command. The `\n` and trailing `\` characters are intended to
          # appear verbatim in the operator's terminal — they are not
          # being expanded by this script. printf is used to emit them
          # without ambiguity (echo's escape handling is shell-dependent).
          printf '::error::%s\n' \
            "Deploy failed. To roll back, restore the pre-deploy" \
            "REVERIE_VERSION in /opt/reverie-dev/.env.version and re-run" \
            "docker compose up -d inside the LXC." \
            "" \
            "ROLLBACK: REVERIE_VERSION=${PRE_VERSION}" \
            "" \
            "One-line rollback command (operator-side, in workspace shell):" \
            "" \
            "printf 'REVERIE_VERSION=%s\\n' '${PRE_VERSION}' > /tmp/rb.env && \\" \
            "  scp /tmp/rb.env oci-compute-1:/tmp/rb.env && \\" \
            "  ssh oci-compute-1 'sudo incus file push /tmp/rb.env reverie-dev/opt/reverie-dev/.env.version && \\" \
            "    sudo incus exec reverie-dev -- bash -lc \"cd /opt/reverie-dev && docker compose -f compose.yml -f compose.hawser.yml --env-file .env --env-file .env.version up -d\"' && \\" \
            "  rm /tmp/rb.env"

      # Companion to the breadcrumb step above: fire when the deploy
      # failed *and* the snapshot step could not capture a usable
      # REVERIE_VERSION (file missing, malformed, or LXC inaccessible
      # at snapshot time). Emitting the full rollback command in that
      # case would print `REVERIE_VERSION=unknown`, which would push
      # the LXC into an unpullable state if the operator pasted it
      # blindly. A plain warning is safer.
      - name: Note rollback target unavailable
        if: failure() && (steps.pre.outputs.version == '' || steps.pre.outputs.version == 'unknown')
        run: |
          echo "::warning::Deploy failed before a usable pre-deploy REVERIE_VERSION was captured."
          echo "::warning::Skipping the copy-paste rollback command — the snapshot value would resolve to 'unknown'."
          echo "::warning::Recover manually: inspect /opt/reverie-dev/.env.version inside the LXC and pick a known-good tag from GHCR."

      - name: In-LXC /health/ready probe
        run: |
          response=$(incus exec reverie-dev:reverie-dev -- \
            curl -sS -o /dev/null -w "%{http_code}" http://127.0.0.1:3000/health/ready --max-time 5)
          if [[ "$response" != "200" ]]; then
            echo "::error::/health/ready returned $response, expected 200"
            exit 1
          fi
          echo "/health/ready returned 200"
