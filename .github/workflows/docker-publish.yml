name: Docker Publish

# Two publication channels per ADR
# adr/2026-05-12-platform-matrix-via-native-runners.md
# (supersedes adr/2026-05-12-decouple-staging-image-from-semver-releases.md):
#   - `main`-branch push -> `:main` (floating) + `:sha-<7>` (immutable pin)
#   - `v*` tag push      -> `:vX.Y.Z` + `:X.Y` (semver, via release-please)
# `:latest` is intentionally not auto-assigned; reserved for the first
# semver release.
#
# Platform matrix split by trigger — see ADR:
#   - `main`-branch push -> linux/arm64 only. Sole consumer is
#     oci-compute-1 (Ampere A1, arm64). Single-arch keeps main-push CI
#     fast.
#   - `v*` tag push      -> linux/amd64,linux/arm64 manifest list.
#     Public-release boundary; self-hosters run mixed architectures.
#
# Build shape: each architecture builds on a native GitHub-hosted runner
# (amd64 on ubuntu-latest, arm64 on ubuntu-24.04-arm), pushed by digest.
# A final `merge` job assembles the manifest list with
# `docker buildx imagetools create`. No QEMU; release boundary fully
# native on both legs.
on:
  push:
    tags:
      - "v*"
    branches:
      - main

permissions:
  contents: read
  packages: write

# cancel-in-progress trades intermediate `:sha-<7>` pins on fast-follow
# `main` pushes for build-queue throughput. SHA pins are therefore
# best-effort, not a guaranteed log of every commit that landed.
concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: unkos-dev/reverie

jobs:
  build:
    # Per-instance gate: tag-push runs both legs; main-push runs only
    # arm64 (sole consumer is oci-compute-1). Skipped matrix instances
    # complete as success for the downstream `merge` job's needs:.
    if: github.ref_type == 'tag' || matrix.arch == 'arm64'
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            runner: ubuntu-latest
          - arch: arm64
            platform: linux/arm64
            runner: ubuntu-24.04-arm
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      # Per-arch builds push by digest only; tag assignment happens in
      # the `merge` job against the final manifest list.
      - name: Build and push by digest
        id: build
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: ${{ matrix.platform }}
          outputs: type=image,name=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }},push-by-digest=true,name-canonical=true,push=true
          provenance: mode=max
          sbom: true

      - name: Export digest
        run: |
          mkdir -p "${{ runner.temp }}/digests"
          digest="${{ steps.build.outputs.digest }}"
          touch "${{ runner.temp }}/digests/${digest#sha256:}"

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: digests-${{ matrix.arch }}
          path: ${{ runner.temp }}/digests/*
          if-no-files-found: error
          retention-days: 1

  merge:
    runs-on: ubuntu-latest
    needs:
      - build
    steps:
      - name: Download digests
        uses: actions/download-artifact@v4
        with:
          path: ${{ runner.temp }}/digests
          pattern: digests-*
          merge-multiple: true

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/setup-buildx-action@v3

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-,enable=${{ github.ref_type != 'tag' }}

      # imagetools create assembles a manifest list from the per-arch
      # digests and tags it. Provenance/SBOM attestations on the per-arch
      # images are preserved on the resulting manifest list.
      - name: Create manifest list and push
        working-directory: ${{ runner.temp }}/digests
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          tag_args=$(jq -cr '.tags | map("-t " + .) | join(" ")' <<< "$DOCKER_METADATA_OUTPUT_JSON")
          digest_args=$(printf "${IMAGE_REF}@sha256:%s " *)
          docker buildx imagetools create $tag_args $digest_args

      - name: Inspect image
        env:
          IMAGE_REF: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
        run: |
          docker buildx imagetools inspect "${IMAGE_REF}:${{ steps.meta.outputs.version }}"
