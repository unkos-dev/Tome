name: Docker Publish

# Two publication channels per ADR
# adr/2026-05-12-decouple-staging-image-from-semver-releases.md:
#   - `main`-branch push -> `:main` (floating) + `:sha-<7>` (immutable pin)
#   - `v*` tag push     -> `:vX.Y.Z` + `:X.Y` (semver, via release-please)
# `:latest` is intentionally not auto-assigned; reserved for the first
# semver release. See ADR for the alternatives considered and the
# revisit conditions.
on:
  push:
    tags:
      - "v*"
    branches:
      - main

permissions:
  contents: read
  packages: write

concurrency:
  group: docker-publish-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: unkos-dev/reverie

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/metadata-action@v6
        id: meta
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=ref,event=branch
            type=sha,prefix=sha-

      - uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
