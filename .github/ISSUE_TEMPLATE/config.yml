blank_issues_enabled: false
contact_links:
  - name: Security vulnerability (private disclosure)
    url: https://github.com/unkos-dev/reverie/security/advisories/new
    about: |
      Report security vulnerabilities privately via GitHub Security Advisories.
      DO NOT open a public issue for security concerns — Reverie is designed
      for self-hosted deployment, and a public report gives attackers a window
      before operators can patch.
